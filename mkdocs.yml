site_name: PhoneMarket
site_url: https://khasanov4mir-sudo.github.io/project/
site_description: Лучшие смартфоны по лучшим ценам
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Светлая тема
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

nav:
  - Главная: index.md
  - Каталог:
    - Все телефоны: phones/catalog.md
    - Apple iPhone: phones/apple.md
    - Samsung Galaxy: phones/samsung.md
    - Google Pixel: phones/pixel.md
    - Xiaomi: phones/xiaomi.md
  - Сравнение: pages/compare.md
  - О нас: pages/about.md
  - Контакты: pages/contact.md

plugins:
  - search:
      lang: ru

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
extra:
  404_page: 404.md